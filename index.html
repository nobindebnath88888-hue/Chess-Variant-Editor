<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-Player Variant Platform</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="sidebar">
        <div class="section-title">Color</div>
        <div class="color-grid">
            <div class="color-btn active" id="btn-white" onclick="selectColor('white')">WHITE</div>
            <div class="color-btn" id="btn-silver" onclick="selectColor('silver')">SILVER</div>
            <div class="color-btn" id="btn-black" onclick="selectColor('black')">BLACK</div>
            <div class="color-btn" id="btn-gold" onclick="selectColor('gold')">GOLD</div>
        </div>

        <div class="section-title">Pieces</div>
        <div class="piece-grid" id="piece-tools"></div>
        <button class="btn-action btn-secondary" id="btn-eraser" onclick="selectTool('eraser')" style="margin-top:20px">ERASER</button>
    </div>

    <div id="main-viewport">
        <div id="board-container">
            <div id="chess-board"></div>
        </div>
    </div>

    <div id="settings">
        <div class="section-title">Rules</div>
        <div class="control-group">
            <label>Size: <b id="dim-label">14 x 14</b></label>
            <input type="range" min="8" max="18" value="14" step="2" oninput="changeSize(this.value)">
        </div>
        <div class="control-group">
            <label><input type="checkbox" id="team-mode" onchange="toggleTeamMode()"> Team Mode</label>
        </div>
        <button class="btn-action" onclick="saveToFirebase()">DEPLOY VARIANT</button>
        <button class="btn-action btn-secondary" onclick="clearBoard()">CLEAR ALL</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
